apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    editable: true
    jsonData:
      timeInterval: 30s

  - name: Jaeger
    type: jaeger
    url: http://jaeger:16686
    access: proxy
    editable: true

  - name: PostgreSQL
    type: postgres
    url: postgres:5432
    access: proxy
    database: compass
    user: compass
    password: compass_password
    editable: true
    jsonData:
      sslmode: disable
