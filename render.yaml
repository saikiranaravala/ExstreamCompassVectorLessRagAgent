services:
  # ── Backend API ────────────────────────────────────────────────────────────
  - type: web
    name: document-assistant-api
    env: python
    plan: free
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements-render.txt
    startCommand: PYTHONPATH=src uvicorn compass.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false          # Set this in the Render dashboard after deploy
      - key: DEBUG
        value: "false"

  # ── Frontend Static Site ───────────────────────────────────────────────────
  - type: web
    name: document-assistant-ui
    env: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: ./frontend/dist
    envVars:
      - key: VITE_API_URL
        sync: false          # Set to: https://document-assistant-api.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
